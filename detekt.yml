# Detekt configuration for ghshhf/Operit fork.
#
# Pragmatic baseline: we surface issues without failing CI on the first runs
# (warningsAsErrors: false, generous maxIssues). Tighten over time as the
# codebase is cleaned up. Run locally with:
#   java -jar detekt-cli-<ver>-all.jar --config detekt.yml --input .

build:
  maxIssues: 1000
  weights:
    complexity: 2
    style: 1

config:
  validation: true
  warningsAsErrors: false
  parallel: true
  buildOverrides:
    maxIssues: 1000

processors:
  active: true
  exclude:
    - "DetektProgressListener"

comments:
  active: true

excludes:
  packages:
    - "**.test.**"
    - "**.androidTest.**"
  rules:
    - "*.kts"
    - "**/build/**"
    - "**/generated/**"

# ---- Rule sets (deliberately lenient for the early baseline) ----------------

complexity:
  active: true
  ComplexCondition:
    active: true
    threshold: 5
  LongMethod:
    active: true
    threshold: 150
  LongParameterList:
    active: true
    threshold: 12
  NestedBlockDepth:
    active: true
    threshold: 6
  TooManyFunctions:
    active: false

style:
  active: true
  MagicNumber:
    active: false
  WildcardImport:
    active: true
  ImportOrdering:
    active: false
  MaxLineLength:
    active: true
    maxLineLength: 120
    excludePackageStatements: true
    excludeImportStatements: true
  UnusedImports:
    active: true
  UtilityClassWithPublicConstructor:
    active: false

potential-bugs:
  active: true
  Deprecation:
    active: true
  UnsafeCallOnNullableType:
    active: false
  TooGenericExceptionCaught:
    active: false
  CastToNullableType:
    active: false

performance:
  active: true
  SpreadOperator:
    active: false

naming:
  active: true
  MatchingDeclarationName:
    active: true
  PackageNaming:
    active: false
  TopLevelPropertyNaming:
    active: false

exceptions:
  active: false
