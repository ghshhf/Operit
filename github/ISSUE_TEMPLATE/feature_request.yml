name: Feature request / 功能建议
description: Suggest a new feature or improvement for Operit
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        欢迎提建议！请说清楚痛点与期望，越具体越容易被采纳。
  - type: textarea
    id: problem
    attributes:
      label: 想要解决的问题
      description: 这个 feature 能解决什么痛点？
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 你期望怎么实现？（可选）
  - type: textarea
    id: context
    attributes:
      label: 补充背景
      description: 使用场景、参考链接等
