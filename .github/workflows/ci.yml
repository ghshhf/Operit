# =============================================================================
# CI for ghshhf/Operit  (engineering-hardening baseline)
#
# WHAT THIS DOES
#   - build : compile Kotlin + run JVM unit tests. This is the HARD gate:
#             "it must compile and existing tests must pass".
#             We intentionally do NOT assemble the full native APK on every PR
#             push -- the MNN / llama.cpp / ncnn native build is heavy and was
#             flaky/timing out on the free runner. Full `assembleDebug` runs on
#             a nightly schedule (see `nightly-apk`) for release-readiness.
#   - lint  : ktlint (Kotlin style) + detekt (static analysis). SOFT
#             (continue-on-error) because the inherited upstream tree has
#             pre-existing style debt; flip to blocking after a cleanup sprint.
#
# 2026-07-13 change: the previous `./gradlew assembleDebug` gate was red because
# a core source file (ToolExecutionManager.kt) had been corrupted on `main`; it is
# now restored. The gate is also scoped down to compile + test to avoid native
# build flakiness on the free runner, with full APK moved to nightly.
# =============================================================================

name: CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]          # also gate every upstream sync merge
  schedule:
    - cron: '17 3 * * *'         # nightly full APK build for release-readiness
  workflow_dispatch:

permissions:
  contents: read

env:
  JAVA_HOME: /usr/lib/jvm/temurin-17-jdk

jobs:
  # ---------------------------------------------------------------------------
  build:
    name: Compile & Unit Test
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout (submodules off; we init the HTTPS ones manually)
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Init compile-time submodules (HTTPS only)
        run: |
          git submodule update --init --depth 1 \
            terminal \
            mnn/src/main/cpp/MNN \
            llama/third_party/llama.cpp \
            mmd/third_party/saba \
            mmd/third_party/bullet3 \
            app/src/main/cpp/thirdparty/ncnn \
            app/src/main/cpp/thirdparty/sherpa-ncnn \
            quickjs/thirdparty/quickjs \
            fbx/third_party/ufbx

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK + CMake + platform and accept licenses
        run: |
          sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "ndk;27.0.12077973" "cmake;3.22.1" "platforms;android-36" "build-tools;36.0.0"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/27.0.12077973" >> "$GITHUB_ENV"

      - name: Point local.properties at the CI SDK
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Compile Kotlin + run JVM unit tests (gate)
        run: ./gradlew :app:compileDebugKotlin testDebugUnitTest --no-daemon --stacktrace

  # ---------------------------------------------------------------------------
  nightly-apk:
    name: Nightly full APK build
    runs-on: ubuntu-latest
    timeout-minutes: 180
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Init compile-time submodules (HTTPS only)
        run: |
          git submodule update --init --depth 1 \
            terminal \
            mnn/src/main/cpp/MNN \
            llama/third_party/llama.cpp \
            mmd/third_party/saba \
            mmd/third_party/bullet3 \
            app/src/main/cpp/thirdparty/ncnn \
            app/src/main/cpp/thirdparty/sherpa-ncnn \
            quickjs/thirdparty/quickjs \
            fbx/third_party/ufbx

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK + CMake + platform and accept licenses
        run: |
          sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "ndk;27.0.12077973" "cmake;3.22.1" "platforms;android-36" "build-tools;36.0.0"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/27.0.12077973" >> "$GITHUB_ENV"

      - name: Point local.properties at the CI SDK
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Assemble debug APK (full native build)
        run: ./gradlew assembleDebug --no-daemon --stacktrace

  # ---------------------------------------------------------------------------
  lint:
    name: ktlint + detekt
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true     # TODO: remove after style cleanup sprint
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: ktlint
        run: |
          curl -sSL -o ktlint.zip https://github.com/pinterest/ktlint/releases/download/1.5.0/ktlint-cli-1.5.0.zip
          unzip -o ktlint.zip
          ./ktlint --editorconfig=./.editorconfig . || true

      - name: detekt
        run: |
          curl -sSL -o detekt.zip https://github.com/detekt/detekt/releases/download/v1.23.7/detekt-cli-1.23.7.zip
          unzip -o detekt.zip
          java -jar detekt-cli-1.23.7/lib/detekt-cli-1.23.7-all.jar \
            --config detekt.yml \
            --input . \
            --excludes "**/build/**,**/.idea/**,**/.git/**" \
            --report sarif:detekt.sarif.json || true
