name: 🐛 Bug report
description: Report a crash, regression, or broken behaviour in ghshhf/Operit
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! Please provide enough detail so a maintainer can reproduce.
        For fork-specific issues, add the `fork-enhancement` context in the description.
  - type: input
    id: version
    attributes:
      label: Fork version
      description: e.g. v1.12.0-fork.1 (see About This Fork in README)
      placeholder: v1.12.0-fork.1
    validations:
      required: true
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce it? Be specific.
      placeholder: |
        1. Go to ...
        2. Tap ...
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / stacktrace (optional)
      description: Paste relevant logcat or crash output.
      render: shell
  - type: dropdown
    id: upstream
    attributes:
      label: Does this also happen on upstream AAswordman/Operit?
      options:
        - "Unknown / not tested"
        - "Yes — also broken upstream"
        - "No — fork-specific regression"
    validations:
      required: false
